<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320" shape-rendering="crispEdges">
  <!-- BG dark screen -->
  <rect width="480" height="320" fill="#0f380f"/>
  <!-- Scanlines -->
  <rect width="480" height="320" fill="url(#scan)"/>
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="rgba(0,0,0,0.25)"/>
    </pattern>
  </defs>

  <!-- CRT monitor pixel frame -->
  <rect x="40"  y="24"  width="400" height="240" fill="#306230" stroke="#9bbc0f" stroke-width="4"/>
  <rect x="48"  y="32"  width="384" height="224" fill="#0a1a0a" stroke="#8bac0f" stroke-width="2"/>

  <!-- Code lines pixel -->
  <rect x="64"  y="50"  width="80"  height="8" fill="#cc2200"/>  <!-- keyword -->
  <rect x="152" y="50"  width="120" height="8" fill="#9bbc0f"/>
  <rect x="280" y="50"  width="64"  height="8" fill="#f8d030"/>

  <rect x="64"  y="70"  width="16"  height="8" fill="#9bbc0f"/>
  <rect x="88"  y="70"  width="96"  height="8" fill="#2868c8"/>
  <rect x="192" y="70"  width="48"  height="8" fill="#9bbc0f"/>
  <rect x="248" y="70"  width="80"  height="8" fill="#e8f0d8"/>

  <rect x="80"  y="90"  width="64"  height="8" fill="#f8d030"/>
  <rect x="152" y="90"  width="16"  height="8" fill="#9bbc0f"/>
  <rect x="176" y="90"  width="96"  height="8" fill="#38a838"/>

  <rect x="80"  y="110" width="32"  height="8" fill="#cc2200"/>
  <rect x="120" y="110" width="112" height="8" fill="#e8f0d8"/>
  <rect x="240" y="110" width="48"  height="8" fill="#f8d030"/>

  <rect x="64"  y="130" width="16"  height="8" fill="#9bbc0f"/>
  <rect x="64"  y="150" width="80"  height="8" fill="#306230"/>
  <rect x="64"  y="170" width="48"  height="8" fill="#cc2200"/>
  <rect x="120" y="170" width="80"  height="8" fill="#e8f0d8"/>

  <!-- Browser window dots -->
  <rect x="56"  y="36"  width="12" height="12" fill="#cc2200" stroke="#0a0a0a" stroke-width="1"/>
  <rect x="72"  y="36"  width="12" height="12" fill="#f8d030" stroke="#0a0a0a" stroke-width="1"/>
  <rect x="88"  y="36"  width="12" height="12" fill="#38a838" stroke="#0a0a0a" stroke-width="1"/>
  <!-- URL bar -->
  <rect x="108" y="36"  width="300" height="12" fill="#e8f0d8" stroke="#0f380f" stroke-width="1"/>
  <text x="114" y="46"  font-family="monospace" font-size="8" fill="#0f380f">https://mi-portfolio.dev</text>

  <!-- Cursor blink -->
  <rect x="64"  y="190" width="8" height="12" fill="#9bbc0f" opacity="0.9"/>

  <!-- Status bar -->
  <rect x="48"  y="240" width="384" height="16" fill="#0f380f" stroke="#306230" stroke-width="1"/>
  <text x="56"  y="252" font-family="monospace" font-size="8" fill="#9bbc0f">& DESARROLLADOR WEB   &gt; npm run dev_</text>

  <!-- GB bottom frame -->
  <rect x="40"  y="264" width="400" height="32" fill="#306230" stroke="#9bbc0f" stroke-width="3"/>
  <text x="160" y="286" font-family="monospace" font-size="10" font-weight="bold" fill="#e8f0d8" text-anchor="middle">[ WEB PROJECT — PLACEHOLDER ]</text>
</svg>

