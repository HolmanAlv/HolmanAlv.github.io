  <!-- Dialog text -->
  <text x="56"  y="228" font-family="monospace" font-size="11" fill="#0f380f">What will</text>
  <text x="56"  y="248" font-family="monospace" font-size="11" fill="#0f380f">SQUIRTLE do?</text>
  <text x="200" y="290" font-family="monospace" font-size="9"  fill="#306230">▼</text>
